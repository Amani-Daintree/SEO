name: Build macOS app
  run: |
    pyinstaller --windowed --name "SeeooIndia" seeoo_india.py

name: Show build output
  run: |
    ls -la
    ls -la dist || true
    find . -name "*.app"

name: Upload artifact
  uses: actions/upload-artifact@v4
  with:
    name: SeeooIndia-macOS
    path: dist/**
    if-no-files-found: error